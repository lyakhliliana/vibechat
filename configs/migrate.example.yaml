# ---- PostgreSQL (default) ------------------------------------------------
storage:
  type: postgres
  postgres:
    host: localhost
    port: 5432
    user: vibechat
    password: <your-db-password>
    dbname: vibechat
    ssl_mode: disable
    migrations_path: migrations/postgres  # PostgreSQL migrations live in migrations/postgres/

# ---- MySQL (alternative) -------------------------------------------------
