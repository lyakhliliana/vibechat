services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vibechat
      POSTGRES_PASSWORD: vibechat
      POSTGRES_DB: vibechat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibechat"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass vibechat
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vibechat", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: build/migrate/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: build/app/Dockerfile
    ports:
      - "8080:8080"
      - "127.0.0.1:8082:8082"  # pprof
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    volumes:
      - ./docs:/openapi

volumes:
  postgres_data:
  redis_data:
